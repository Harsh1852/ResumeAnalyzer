name: Deploy frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_AUTH_API_URL: https://y27jmbvfp1.execute-api.us-east-1.amazonaws.com/prod
          VITE_APP_API_URL: https://h7imckxbn4.execute-api.us-east-1.amazonaws.com/prod
          VITE_RESULTS_API_URL: https://x8ia4xnfxa.execute-api.us-east-1.amazonaws.com/prod
          VITE_JOBS_API_URL: https://rdymnkp5gd.execute-api.us-east-1.amazonaws.com/prod
          VITE_APPLICATIONS_API_URL: https://6on3kwyk6j.execute-api.us-east-1.amazonaws.com/prod
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://resumeanalyzerfrontend-frontendbucketefe2e19c-nmydecejrczj/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html s3://resumeanalyzerfrontend-frontendbucketefe2e19c-nmydecejrczj/index.html \
            --cache-control "public,max-age=0,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ERKB91T48JMJU \
            --paths "/*"
